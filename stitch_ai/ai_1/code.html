<body class="bg-background h-screen w-screen overflow-hidden font-body-md text-body-md text-on-surface m-0 p-0 relative">
<!-- Background Environment: Home Page Screen -->
<iframe aria-hidden="true" class="absolute inset-0 w-full h-full border-0 z-0 pointer-events-none" src="{{DATA:SCREEN:SCREEN_2}}"></iframe>
<!-- Overlay / Scrim -->
<div class="absolute inset-0 z-10 bg-on-background/40 backdrop-blur-sm flex items-center justify-center p-gutter transition-opacity duration-300">
<!-- Modal Container -->
<div aria-labelledby="modal-title" aria-modal="true" class="bg-surface rounded-xl w-full max-w-md academic-modal-shadow border border-outline-variant/30 flex flex-col relative transform transition-all duration-300 scale-100 opacity-100" role="dialog">
<!-- Close Button -->
<button aria-label="关闭弹窗" class="absolute top-sm right-sm w-8 h-8 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container z-20">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
<!-- Header -->
<div class="px-lg pt-lg pb-md text-center flex flex-col items-center">
<!-- Decorative Icon (Optional but adds academic feel) -->
<div class="w-12 h-12 bg-primary-fixed rounded-lg flex items-center justify-center mb-sm text-on-primary-fixed-variant">
<span class="material-symbols-outlined text-[28px]">school</span>
</div>
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface" id="modal-title">欢迎来到南大AI社区</h2>
</div>
<!-- Tabs -->
<div class="flex px-lg border-b border-outline-variant/30 mb-md relative">
<button class="flex-1 pb-xs font-title-md text-title-md text-primary-container border-b-2 border-primary-container transition-all hover:bg-surface-container-lowest focus:outline-none" id="tab-login">
                    登录
                </button>
<button class="flex-1 pb-xs font-title-md text-title-md text-on-surface-variant border-b-2 border-transparent hover:text-on-surface hover:bg-surface-container-lowest transition-all focus:outline-none" id="tab-register">
                    注册
                </button>
</div>
<!-- Form Area -->
<form class="px-lg pb-lg flex flex-col gap-md" id="auth-form">
<!-- Email Field -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">邮箱地址</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline pointer-events-none text-[20px]">mail</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="yourname@nju.edu.cn" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">密码</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline pointer-events-none text-[20px]">lock</span>
<input class="w-full pl-xl pr-xl py-sm bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="切换密码可见性" class="absolute right-sm text-outline hover:text-on-surface transition-colors flex items-center justify-center focus:outline-none rounded-full p-1" id="toggle-password" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibility-icon">visibility_off</span>
</button>
</div>
</div>
<!-- Actions Row -->
<div class="flex justify-between items-center mt-xs">
<div class="flex items-center gap-2 opacity-0" id="remember-me-wrapper">
<!-- Space reserved for register state if needed, or remember me -->
<input class="rounded border-outline-variant text-primary-container focus:ring-primary-container bg-surface-container-low w-4 h-4" id="remember" type="checkbox"/>
<label class="font-caption text-caption text-on-surface-variant cursor-pointer" for="remember">记住我</label>
</div>
<a class="font-caption text-caption text-on-surface-variant hover:text-primary-container transition-colors underline-offset-2 hover:underline" href="#">忘记密码？</a>
</div>
<!-- Main Submit Button -->
<button class="w-full py-sm bg-primary-container hover:bg-primary text-on-primary rounded-lg font-title-md text-title-md transition-all active:scale-[0.98] shadow-sm mt-sm flex items-center justify-center gap-2" id="submit-btn" type="submit">
                    登录
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-sm mt-md">
<div class="flex-1 h-px bg-outline-variant/40"></div>
<span class="font-caption text-caption text-outline">其他登录方式</span>
<div class="flex-1 h-px bg-outline-variant/40"></div>
</div>
<!-- Third-party Login -->
<div class="flex justify-center gap-md mt-sm">

</button>
<!-- QQ -->
<button aria-label="使用QQ登录" class="w-12 h-12 rounded-full border border-outline-variant bg-surface hover:bg-surface-container-low hover:border-outline flex items-center justify-center transition-all group focus:outline-none focus:ring-2 focus:ring-primary-container text-[#12B7F5]" type="button">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20"><path d="M12,2C6.48,2,2,6.48,2,12s4.48,10,10,10s10-4.48,10-10S17.52,2,12,2z M12,19.2c-2.5,0-4.71-1.28-6-3.22 c0.03-1.99,4-3.08,6-3.08c1.99,0,5.97,1.09,6,3.08C16.71,17.92,14.5,19.2,12,19.2z M18.36,14.63c-1.44-0.91-3.52-1.55-5.36-1.7V11 c1.1,0,2-0.9,2-2V7c0-1.1-0.9-2-2-2h-2C9.9,5,9,5.9,9,7v2c0,1.1,0.9,2,2,2v1.93c-1.84,0.15-3.92,0.79-5.36,1.7 c-0.64-1.2-1.02-2.6-1.02-4.13c0-4.63,3.77-8.4,8.4-8.4s8.4,3.77,8.4,8.4C21.42,12.03,21.04,13.43,18.36,14.63z"></path></svg>
</button>
<!-- SSO (Academic) -->
<button aria-label="使用统一身份认证登录" class="w-12 h-12 rounded-full border border-outline-variant bg-surface hover:bg-surface-container-low hover:border-outline flex items-center justify-center transition-all group focus:outline-none focus:ring-2 focus:ring-primary-container text-tertiary" type="button">
<span class="material-symbols-outlined text-[20px]">account_balance</span>
</button>
</div>
</form>
</div>
</div>
<!-- Inline JavaScript for micro-interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const submitBtn = document.getElementById('submit-btn');
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('toggle-password');
            const visibilityIcon = document.getElementById('visibility-icon');
            const rememberMeWrapper = document.getElementById('remember-me-wrapper');

            // Tab Switching Logic
            const switchTab = (mode) => {
                const activeClasses = ['text-primary-container', 'border-primary-container'];
                const inactiveClasses = ['text-on-surface-variant', 'border-transparent'];

                if (mode === 'login') {
                    tabLogin.classList.add(...activeClasses);
                    tabLogin.classList.remove(...inactiveClasses);
                    tabRegister.classList.remove(...activeClasses);
                    tabRegister.classList.add(...inactiveClasses);
                    submitBtn.innerHTML = '登录 <span class="material-symbols-outlined text-[20px]">arrow_forward</span>';
                    rememberMeWrapper.classList.remove('opacity-0');
                    rememberMeWrapper.classList.add('opacity-100');
                } else {
                    tabRegister.classList.add(...activeClasses);
                    tabRegister.classList.remove(...inactiveClasses);
                    tabLogin.classList.remove(...activeClasses);
                    tabLogin.classList.add(...inactiveClasses);
                    submitBtn.innerHTML = '注册 <span class="material-symbols-outlined text-[20px]">person_add</span>';
                    rememberMeWrapper.classList.remove('opacity-100');
                    rememberMeWrapper.classList.add('opacity-0');
                }
            };

            tabLogin.addEventListener('click', () => switchTab('login'));
            tabRegister.addEventListener('click', () => switchTab('register'));

            // Initial State setup
            switchTab('login');

            // Password Visibility Toggle
            togglePasswordBtn.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    visibilityIcon.textContent = 'visibility';
                    visibilityIcon.classList.add('text-primary-container');
                } else {
                    passwordInput.type = 'password';
                    visibilityIcon.textContent = 'visibility_off';
                    visibilityIcon.classList.remove('text-primary-container');
                }
            });

            // Prevent form submission for demo purposes
            document.getElementById('auth-form').addEventListener('submit', (e) => {
                e.preventDefault();
                // Add a subtle click effect
                submitBtn.classList.add('scale-95');
                setTimeout(() => submitBtn.classList.remove('scale-95'), 150);
            });
        });
    </script>
</body></html>
